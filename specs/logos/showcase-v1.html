<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lionia - Logos v1</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #fff; }
      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
      }
      .cell {
        aspect-ratio: 1;
        border: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .cell svg {
        width: 100%;
        height: 100%;
        max-width: 80px;
        max-height: 80px;
      }
    </style>
  </head>
  <body>
    <div class="grid">

      <!-- 1: Rounded lion face - simple arcs for ears and mane -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Mane outer -->
          <circle cx="250" cy="260" r="190" fill="#000"/>
          <!-- Face -->
          <circle cx="250" cy="270" r="130" fill="#fff"/>
          <!-- Left ear -->
          <circle cx="150" cy="150" r="50" fill="#000"/>
          <circle cx="150" cy="150" r="28" fill="#fff"/>
          <!-- Right ear -->
          <circle cx="350" cy="150" r="50" fill="#000"/>
          <circle cx="350" cy="150" r="28" fill="#fff"/>
          <!-- Eyes -->
          <circle cx="205" cy="250" r="18" fill="#000"/>
          <circle cx="295" cy="250" r="18" fill="#000"/>
          <!-- Nose -->
          <ellipse cx="250" cy="310" rx="22" ry="16" fill="#000"/>
          <!-- Mouth -->
          <path d="M230 330 Q250 355 270 330" stroke="#000" stroke-width="8" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- 2: Geometric lion profile - triangles forming profile -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Mane -->
          <path d="M120 130 Q80 250 120 370 Q180 430 280 430 L280 130 Z" fill="#000" rx="20"/>
          <!-- Head circle -->
          <circle cx="300" cy="260" r="110" fill="#000"/>
          <!-- Face cutout -->
          <circle cx="310" cy="255" r="80" fill="#fff"/>
          <!-- Eye -->
          <circle cx="340" cy="235" r="14" fill="#000"/>
          <!-- Nose -->
          <circle cx="370" cy="275" r="12" fill="#000"/>
          <!-- Snout line -->
          <path d="M358 290 Q370 305 355 310" stroke="#000" stroke-width="6" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- 3: Ultra-minimal lion - 3 shapes -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Mane - rounded triangle -->
          <path d="M250 80 Q420 80 420 280 Q420 420 250 420 Q80 420 80 280 Q80 80 250 80Z" fill="#000"/>
          <!-- Face -->
          <ellipse cx="250" cy="290" rx="110" ry="120" fill="#fff"/>
          <!-- Eyes -->
          <circle cx="210" cy="260" r="12" fill="#000"/>
          <circle cx="290" cy="260" r="12" fill="#000"/>
          <!-- Nose triangle -->
          <path d="M238 310 L262 310 L250 330 Z" fill="#000" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- 4: Circle with radiating mane arcs -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Mane rays -->
          <path d="M250 60 Q300 120 250 160" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none"/>
          <path d="M380 100 Q350 180 290 180" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none"/>
          <path d="M430 230 Q370 240 340 200" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none"/>
          <path d="M120 100 Q150 180 210 180" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none"/>
          <path d="M70 230 Q130 240 160 200" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none"/>
          <path d="M100 350 Q160 310 190 340" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none"/>
          <path d="M400 350 Q340 310 310 340" stroke="#000" stroke-width="28" stroke-linecap="round" fill="none"/>
          <!-- Head -->
          <circle cx="250" cy="280" r="100" fill="#000"/>
          <!-- Face -->
          <circle cx="250" cy="280" r="70" fill="#fff"/>
          <!-- Eyes -->
          <circle cx="225" cy="265" r="10" fill="#000"/>
          <circle cx="275" cy="265" r="10" fill="#000"/>
          <!-- Nose -->
          <ellipse cx="250" cy="300" rx="12" ry="8" fill="#000"/>
        </svg>
      </div>

      <!-- 5: Stacked rounded shapes lion -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Mane layers -->
          <ellipse cx="250" cy="230" rx="200" ry="180" fill="#000"/>
          <!-- Middle layer -->
          <ellipse cx="250" cy="250" rx="150" ry="140" fill="#fff"/>
          <!-- Inner face -->
          <ellipse cx="250" cy="270" rx="120" ry="130" fill="#000"/>
          <!-- Face cutout -->
          <ellipse cx="250" cy="280" rx="90" ry="100" fill="#fff"/>
          <!-- Eyes -->
          <circle cx="215" cy="260" r="14" fill="#000"/>
          <circle cx="285" cy="260" r="14" fill="#000"/>
          <!-- Nose -->
          <ellipse cx="250" cy="310" rx="16" ry="11" fill="#000"/>
          <!-- Smile -->
          <path d="M230 330 Q250 348 270 330" stroke="#000" stroke-width="7" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- 6: Flowing mane - 3 curved strokes -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M160 120 Q80 200 100 320 Q120 400 200 420" stroke="#000" stroke-width="32" stroke-linecap="round" fill="none"/>
          <path d="M250 80 Q180 180 200 300 Q220 380 280 400" stroke="#000" stroke-width="32" stroke-linecap="round" fill="none"/>
          <path d="M340 120 Q280 200 300 300 Q320 370 360 380" stroke="#000" stroke-width="32" stroke-linecap="round" fill="none"/>
          <!-- Head -->
          <circle cx="300" cy="250" r="80" fill="#000"/>
          <circle cx="300" cy="250" r="55" fill="#fff"/>
          <circle cx="280" cy="240" r="8" fill="#000"/>
          <circle cx="320" cy="240" r="8" fill="#000"/>
          <ellipse cx="300" cy="268" rx="10" ry="7" fill="#000"/>
        </svg>
      </div>

      <!-- 7: Sunburst mane around circle -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Rays -->
          <ellipse cx="250" cy="110" rx="30" ry="60" fill="#000"/>
          <ellipse cx="150" cy="140" rx="30" ry="60" fill="#000" transform="rotate(-40 150 140)"/>
          <ellipse cx="350" cy="140" rx="30" ry="60" fill="#000" transform="rotate(40 350 140)"/>
          <ellipse cx="100" cy="250" rx="30" ry="60" fill="#000" transform="rotate(-90 100 250)"/>
          <ellipse cx="400" cy="250" rx="30" ry="60" fill="#000" transform="rotate(90 400 250)"/>
          <ellipse cx="140" cy="370" rx="28" ry="50" fill="#000" transform="rotate(40 140 370)"/>
          <ellipse cx="360" cy="370" rx="28" ry="50" fill="#000" transform="rotate(-40 360 370)"/>
          <ellipse cx="250" cy="410" rx="28" ry="50" fill="#000"/>
          <!-- Face -->
          <circle cx="250" cy="260" r="110" fill="#000"/>
          <circle cx="250" cy="260" r="80" fill="#fff"/>
          <circle cx="225" cy="245" r="12" fill="#000"/>
          <circle cx="275" cy="245" r="12" fill="#000"/>
          <ellipse cx="250" cy="280" rx="14" ry="10" fill="#000"/>
          <path d="M235 300 Q250 315 265 300" stroke="#000" stroke-width="6" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- 8: Spiral mane -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Spiral -->
          <path d="M250 70 Q430 70 430 250 Q430 430 250 430 Q100 430 100 280 Q100 150 220 150 Q320 150 320 250 Q320 330 250 330" stroke="#000" stroke-width="36" stroke-linecap="round" fill="none"/>
          <!-- Face dot eyes -->
          <circle cx="225" cy="255" r="14" fill="#000"/>
          <circle cx="275" cy="255" r="14" fill="#000"/>
          <ellipse cx="250" cy="290" rx="11" ry="8" fill="#000"/>
        </svg>
      </div>

      <!-- 9: Layered petal mane -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Petals -->
          <ellipse cx="250" cy="100" rx="45" ry="70" fill="#000"/>
          <ellipse cx="145" cy="145" rx="45" ry="70" fill="#000" transform="rotate(-45 145 145)"/>
          <ellipse cx="355" cy="145" rx="45" ry="70" fill="#000" transform="rotate(45 355 145)"/>
          <ellipse cx="100" cy="260" rx="45" ry="70" fill="#000" transform="rotate(-90 100 260)"/>
          <ellipse cx="400" cy="260" rx="45" ry="70" fill="#000" transform="rotate(90 400 260)"/>
          <ellipse cx="155" cy="375" rx="40" ry="60" fill="#000" transform="rotate(45 155 375)"/>
          <ellipse cx="345" cy="375" rx="40" ry="60" fill="#000" transform="rotate(-45 345 375)"/>
          <!-- Head -->
          <circle cx="250" cy="265" r="100" fill="#000"/>
          <circle cx="250" cy="265" r="72" fill="#fff"/>
          <circle cx="225" cy="250" r="11" fill="#000"/>
          <circle cx="275" cy="250" r="11" fill="#000"/>
          <path d="M240 285 L260 285 L250 300 Z" fill="#000"/>
        </svg>
      </div>

      <!-- 10: Wave mane - parallel curves -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M100 150 Q170 100 240 150 Q310 200 380 150" stroke="#000" stroke-width="24" stroke-linecap="round" fill="none"/>
          <path d="M80 220 Q160 170 240 220 Q320 270 400 220" stroke="#000" stroke-width="24" stroke-linecap="round" fill="none"/>
          <path d="M80 290 Q160 240 240 290 Q320 340 400 290" stroke="#000" stroke-width="24" stroke-linecap="round" fill="none"/>
          <!-- Head -->
          <circle cx="300" cy="340" r="90" fill="#000"/>
          <circle cx="300" cy="340" r="62" fill="#fff"/>
          <circle cx="278" cy="325" r="10" fill="#000"/>
          <circle cx="322" cy="325" r="10" fill="#000"/>
          <ellipse cx="300" cy="355" rx="11" ry="8" fill="#000"/>
        </svg>
      </div>

      <!-- 11: Neural network lion -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Connection lines -->
          <line x1="130" y1="120" x2="200" y2="200" stroke="#000" stroke-width="6"/>
          <line x1="250" y1="80" x2="250" y2="180" stroke="#000" stroke-width="6"/>
          <line x1="370" y1="120" x2="300" y2="200" stroke="#000" stroke-width="6"/>
          <line x1="80" y1="260" x2="170" y2="260" stroke="#000" stroke-width="6"/>
          <line x1="420" y1="260" x2="330" y2="260" stroke="#000" stroke-width="6"/>
          <line x1="130" y1="400" x2="200" y2="330" stroke="#000" stroke-width="6"/>
          <line x1="370" y1="400" x2="300" y2="330" stroke="#000" stroke-width="6"/>
          <!-- Outer nodes (mane) -->
          <circle cx="130" cy="120" r="22" fill="#000"/>
          <circle cx="250" cy="80" r="22" fill="#000"/>
          <circle cx="370" cy="120" r="22" fill="#000"/>
          <circle cx="80" cy="260" r="22" fill="#000"/>
          <circle cx="420" cy="260" r="22" fill="#000"/>
          <circle cx="130" cy="400" r="22" fill="#000"/>
          <circle cx="370" cy="400" r="22" fill="#000"/>
          <!-- Head -->
          <circle cx="250" cy="265" r="90" fill="#000"/>
          <circle cx="250" cy="265" r="62" fill="#fff"/>
          <circle cx="228" cy="250" r="10" fill="#000"/>
          <circle cx="272" cy="250" r="10" fill="#000"/>
          <ellipse cx="250" cy="282" rx="12" ry="8" fill="#000"/>
        </svg>
      </div>

      <!-- 12: Circuit mane -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Circuit lines from head -->
          <path d="M170 180 L100 180 L100 120" stroke="#000" stroke-width="10" stroke-linecap="round"/>
          <path d="M200 150 L200 80" stroke="#000" stroke-width="10" stroke-linecap="round"/>
          <path d="M250 140 L250 60" stroke="#000" stroke-width="10" stroke-linecap="round"/>
          <path d="M300 150 L300 80" stroke="#000" stroke-width="10" stroke-linecap="round"/>
          <path d="M330 180 L400 180 L400 120" stroke="#000" stroke-width="10" stroke-linecap="round"/>
          <path d="M150 260 L60 260" stroke="#000" stroke-width="10" stroke-linecap="round"/>
          <path d="M350 260 L440 260" stroke="#000" stroke-width="10" stroke-linecap="round"/>
          <!-- Circuit dots -->
          <circle cx="100" cy="120" r="12" fill="#000"/>
          <circle cx="200" cy="80" r="12" fill="#000"/>
          <circle cx="250" cy="60" r="12" fill="#000"/>
          <circle cx="300" cy="80" r="12" fill="#000"/>
          <circle cx="400" cy="120" r="12" fill="#000"/>
          <circle cx="60" cy="260" r="12" fill="#000"/>
          <circle cx="440" cy="260" r="12" fill="#000"/>
          <!-- Head -->
          <circle cx="250" cy="280" r="110" fill="#000"/>
          <circle cx="250" cy="280" r="78" fill="#fff"/>
          <circle cx="222" cy="265" r="12" fill="#000"/>
          <circle cx="278" cy="265" r="12" fill="#000"/>
          <ellipse cx="250" cy="300" rx="14" ry="10" fill="#000"/>
        </svg>
      </div>

      <!-- 13: Data flow lion - dots and lines -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Scattered data dots forming mane shape -->
          <circle cx="160" cy="100" r="10" fill="#000"/>
          <circle cx="210" cy="80" r="14" fill="#000"/>
          <circle cx="270" cy="75" r="12" fill="#000"/>
          <circle cx="330" cy="90" r="10" fill="#000"/>
          <circle cx="110" cy="160" r="12" fill="#000"/>
          <circle cx="380" cy="150" r="11" fill="#000"/>
          <circle cx="90" cy="240" r="10" fill="#000"/>
          <circle cx="405" cy="230" r="10" fill="#000"/>
          <circle cx="120" cy="330" r="9" fill="#000"/>
          <circle cx="380" cy="320" r="9" fill="#000"/>
          <circle cx="160" cy="400" r="8" fill="#000"/>
          <circle cx="340" cy="390" r="8" fill="#000"/>
          <!-- Head solid -->
          <circle cx="250" cy="260" r="95" fill="#000"/>
          <circle cx="250" cy="260" r="65" fill="#fff"/>
          <circle cx="225" cy="245" r="11" fill="#000"/>
          <circle cx="275" cy="245" r="11" fill="#000"/>
          <ellipse cx="250" cy="278" rx="13" ry="9" fill="#000"/>
        </svg>
      </div>

      <!-- 14: Pixel/rounded block lion -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Rounded blocks forming lion shape -->
          <rect x="175" y="60" width="50" height="50" rx="12" fill="#000"/>
          <rect x="235" y="60" width="50" height="50" rx="12" fill="#000"/>
          <rect x="295" y="60" width="50" height="50" rx="12" fill="#000"/>
          <rect x="115" y="120" width="50" height="50" rx="12" fill="#000"/>
          <rect x="175" y="120" width="50" height="50" rx="12" fill="#000"/>
          <rect x="295" y="120" width="50" height="50" rx="12" fill="#000"/>
          <rect x="355" y="120" width="50" height="50" rx="12" fill="#000"/>
          <rect x="115" y="180" width="50" height="50" rx="12" fill="#000"/>
          <rect x="355" y="180" width="50" height="50" rx="12" fill="#000"/>
          <!-- Face area -->
          <rect x="175" y="180" width="170" height="50" rx="12" fill="#000"/>
          <rect x="115" y="240" width="290" height="50" rx="12" fill="#000"/>
          <!-- Eyes as white squares -->
          <rect x="178" y="248" width="28" height="28" rx="8" fill="#fff"/>
          <rect x="314" y="248" width="28" height="28" rx="8" fill="#fff"/>
          <rect x="175" y="300" width="170" height="50" rx="12" fill="#000"/>
          <rect x="175" y="360" width="170" height="50" rx="12" fill="#000"/>
          <!-- Nose -->
          <rect x="230" y="310" width="40" height="30" rx="10" fill="#fff"/>
        </svg>
      </div>

      <!-- 15: Hexagonal lion -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Hexagon frame -->
          <path d="M250 50 L430 150 L430 350 L250 450 L70 350 L70 150 Z" fill="#000"/>
          <!-- Inner hexagon cutout -->
          <path d="M250 130 L360 190 L360 310 L250 370 L140 310 L140 190 Z" fill="#fff"/>
          <!-- Lion face inside -->
          <!-- Ears -->
          <circle cx="180" cy="175" r="22" fill="#000"/>
          <circle cx="320" cy="175" r="22" fill="#000"/>
          <!-- Eyes -->
          <circle cx="215" cy="240" r="14" fill="#000"/>
          <circle cx="285" cy="240" r="14" fill="#000"/>
          <!-- Nose -->
          <ellipse cx="250" cy="285" rx="14" ry="10" fill="#000"/>
          <!-- Mouth -->
          <path d="M235 305 Q250 320 265 305" stroke="#000" stroke-width="6" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- 16: Crown/mane hybrid -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Crown shape = mane -->
          <path d="M100 350 L100 160 L180 230 L250 120 L320 230 L400 160 L400 350 Z" fill="#000" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
          <!-- Face -->
          <ellipse cx="250" cy="310" rx="110" ry="100" fill="#fff"/>
          <!-- Eyes -->
          <circle cx="210" cy="290" r="14" fill="#000"/>
          <circle cx="290" cy="290" r="14" fill="#000"/>
          <!-- Nose -->
          <ellipse cx="250" cy="335" rx="14" ry="10" fill="#000"/>
          <!-- Mouth -->
          <path d="M232 355 Q250 372 268 355" stroke="#000" stroke-width="7" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- 17: Lion eye - single stylized eye -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer eye shape (mane) -->
          <path d="M50 250 Q250 50 450 250 Q250 450 50 250Z" fill="#000"/>
          <!-- White of eye -->
          <ellipse cx="250" cy="250" rx="130" ry="110" fill="#fff"/>
          <!-- Iris -->
          <circle cx="250" cy="250" r="70" fill="#000"/>
          <!-- Pupil -->
          <circle cx="250" cy="250" r="35" fill="#fff"/>
          <!-- Inner dot -->
          <circle cx="250" cy="250" r="15" fill="#000"/>
          <!-- Light reflection -->
          <circle cx="275" cy="230" r="12" fill="#fff"/>
        </svg>
      </div>

      <!-- 18: Shield crest modern -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield shape -->
          <path d="M250 50 L420 130 L420 300 Q420 430 250 470 Q80 430 80 300 L80 130 Z" fill="#000"/>
          <!-- Inner shield -->
          <path d="M250 100 L380 165 L380 290 Q380 395 250 425 Q120 395 120 290 L120 165 Z" fill="#fff"/>
          <!-- Abstract lion in shield -->
          <!-- Mane arcs -->
          <path d="M180 180 Q170 250 200 300" stroke="#000" stroke-width="14" stroke-linecap="round" fill="none"/>
          <path d="M220 160 Q200 230 220 290" stroke="#000" stroke-width="14" stroke-linecap="round" fill="none"/>
          <path d="M260 150 Q250 230 260 290" stroke="#000" stroke-width="14" stroke-linecap="round" fill="none"/>
          <!-- Eye -->
          <circle cx="310" cy="240" r="16" fill="#000"/>
          <!-- Snout -->
          <path d="M300 290 Q330 280 340 300 Q330 320 300 310Z" fill="#000"/>
        </svg>
      </div>

      <!-- 19: Roar - sound waves + mouth -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Lion head -->
          <circle cx="200" cy="250" r="120" fill="#000"/>
          <circle cx="200" cy="250" r="82" fill="#fff"/>
          <!-- Eye -->
          <circle cx="195" cy="220" r="14" fill="#000"/>
          <!-- Open mouth -->
          <path d="M180 270 Q220 320 260 270" fill="#000"/>
          <!-- Sound waves -->
          <path d="M330 200 Q360 250 330 300" stroke="#000" stroke-width="16" stroke-linecap="round" fill="none"/>
          <path d="M370 160 Q415 250 370 340" stroke="#000" stroke-width="16" stroke-linecap="round" fill="none"/>
          <path d="M410 120 Q470 250 410 380" stroke="#000" stroke-width="16" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- 20: Three-shape lion - minimal -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shape 1: Mane - large rounded triangle -->
          <path d="M250 60 Q440 60 420 300 Q400 440 250 440 Q100 440 80 300 Q60 60 250 60Z" fill="#000"/>
          <!-- Shape 2: Face - rounded rectangle -->
          <rect x="145" y="170" width="210" height="230" rx="80" fill="#fff"/>
          <!-- Shape 3: Features - single path -->
          <circle cx="210" cy="270" r="16" fill="#000"/>
          <circle cx="290" cy="270" r="16" fill="#000"/>
          <path d="M230 335 L250 355 L270 335" stroke="#000" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>

    </div>
  </body>
</html>
